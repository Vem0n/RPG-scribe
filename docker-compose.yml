services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rpgscribe}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
      POSTGRES_DB: ${DB_NAME:-rpgscribe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgscribe"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    # Pulled from the GHCR release pipeline. Override the tag with
    # SERVER_TAG=v0.1.x in .env to pin a specific release; defaults to
    # `latest` which tracks the most recent published image.
    # For local dev against unreleased code, swap this for the `build:`
    # block below (commented out).
    image: ghcr.io/vem0n/rpg-scribe:${SERVER_TAG:-latest}
    pull_policy: always
    # build:
    #   context: .
    #   dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8081}:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-rpgscribe}:${DB_PASS}@db:5432/${DB_NAME:-rpgscribe}?sslmode=disable
      API_KEY: ${API_KEY:?Set API_KEY in .env}
      SEED_DATA_DIR: /data/seed-data
      ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
