# Tag-driven release: container image (multi-arch, signed + SBOM) + Tauri
# desktop binaries (.deb / .AppImage / .exe / .msi).
#
# Trigger:  git tag v0.1.0 && git push --tags
#
# Both jobs target the `production` GitHub Environment, which is configured
# with required reviewers — the workflow pauses at the first reviewable
# step until a designated approver clicks "Approve and deploy" in the UI.
# Builds + pushes do not run before approval.
#
# Produces (after a v0.1.0 tag):
#   ghcr.io/vem0n/rpg-scribe:0.1.0     (linux/amd64 + linux/arm64)
#   ghcr.io/vem0n/rpg-scribe:0.1
#   ghcr.io/vem0n/rpg-scribe:latest
#   github.com/Vem0n/RPG-scribe/releases/tag/v0.1.0
#     - sbom.spdx.json
#     - rpg-scribe_0.1.0_amd64.deb
#     - rpg-scribe_0.1.0_amd64.AppImage
#     - rpg-scribe_0.1.0_x64-setup.exe
#     - rpg-scribe_0.1.0_x64_en-US.msi
#   Cosign keyless signatures + SBOM attestations on the image.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # GitHub Release create + asset upload
  packages: write       # GHCR push
  id-token: write       # cosign keyless OIDC token
  attestations: write   # SBOM attestation

# `github.repository` preserves the cased owner/repo (e.g. Vem0n/RPG-scribe).
# OCI registry refs must be lowercase, so we compute it inside the job rather
# than in workflow-level env (which is evaluated before any shell can lowercase it).

jobs:
  image:
    name: Container image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Lowercased image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM to image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdx \
            "${{ steps.img.outputs.name }}@${DIGEST}"

      - name: GitHub Release (auto changelog + SBOM asset)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true
          files: sbom.spdx.json

  desktop:
    name: Desktop bundle (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7  # v1
        with:
          toolchain: stable

      # Tauri 2 on Linux pulls in WebKitGTK 4.1 + libsoup 3 from system
      # packages — the windows runner only needs the bundled Rust + node.
      - name: Install Linux WebKit deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        with:
          projectPath: desktop

      # Both matrix runners attach to the same release object — softprops
      # creates the release on first call and updates it on subsequent
      # ones, so order between the image job and these doesn't matter.
      # fail_on_unmatched_files=false because each runner only produces
      # its own platform's bundles; cross-platform globs are expected to
      # miss on the other runner.
      - name: Attach binaries to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
