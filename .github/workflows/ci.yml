# Build, lint, test, and security-scan every PR and push to master.
#
# All third-party actions are pinned by commit SHA (not tag) so a compromised
# release of an action cannot retroactively alter our build behaviour.
# Dependabot will keep these SHAs updated; the comment after `#` is the
# tag the SHA corresponded to at pin time.
name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — typecheck, lint, build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint .
      - name: Vite build
        run: npx vite build
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  server:
    name: Server — vet, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: go vet
        working-directory: server
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          # v7 of the action is required to install golangci-lint v2.x.
          # Pinned to v2.11.4 explicitly so a future linter release with
          # new default rules can't break the build silently.
          version: v2.11.4
          working-directory: server
      - name: go test (race + coverage)
        working-directory: server
        run: go test -race -coverprofile=coverage.out ./...
      - name: go build
        working-directory: server
        run: go build ./...
      - name: gosec security scan
        working-directory: server
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  python:
    name: Python — ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          src: scraper

  docker:
    name: Docker — build smoke + Trivy scan
    runs-on: ubuntu-latest
    needs: [web, server]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: rpg-scribe:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143  # master
        with:
          image-ref: rpg-scribe:ci
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
