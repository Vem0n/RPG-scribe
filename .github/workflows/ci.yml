# Build, lint, test, and security-scan every PR and push to master.
#
# All third-party actions are pinned by commit SHA (not tag) so a compromised
# release of an action cannot retroactively alter our build behaviour.
# Dependabot will keep these SHAs updated; the comment after `#` is the
# tag the SHA corresponded to at pin time.
name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — typecheck, lint, build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint .
      - name: Vite build
        run: npx vite build
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  server:
    name: Server — vet, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum
      - name: go vet
        working-directory: server
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84  # v6
        with:
          version: latest
          working-directory: server
      - name: go test (race + coverage)
        working-directory: server
        run: go test -race -coverprofile=coverage.out ./...
      - name: go build
        working-directory: server
        run: go build ./...
      - name: gosec security scan
        working-directory: server
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  python:
    name: Python — ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3
        with:
          src: scraper

  docker:
    name: Docker — build smoke + Trivy scan
    runs-on: ubuntu-latest
    needs: [web, server]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: rpg-scribe:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143  # master
        with:
          image-ref: rpg-scribe:ci
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
